name: Build LCOS Branding Repo

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  VERSION: 1.0-2          # Change this line when releasing a new version

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev apt-utils bzip2

      - name: Create package structure
        run: |
          mkdir -p pkg/DEBIAN pkg/usr/share/images/desktop-base
          cp lcos-bw-720.jpg pkg/usr/share/images/desktop-base/
          mkdir -p pkg/DEBIAN pkg/usr/share/pixmaps
          cp lcos32.png pkg/usr/share/pixmaps/

          echo "Package: lcos-branding" > pkg/DEBIAN/control
          echo "Version: ${{ env.VERSION }}" >> pkg/DEBIAN/control
          echo "Section: x11" >> pkg/DEBIAN/control
          echo "Priority: optional" >> pkg/DEBIAN/control
          echo "Architecture: all" >> pkg/DEBIAN/control
          echo "Maintainer: Bryan Lunduke <bryan@lundue.com>" >> pkg/DEBIAN/control
          echo "Description: LCOS Branding" >> pkg/DEBIAN/control
          echo " Branding and Wallpaper for LCOS." >> pkg/DEBIAN/control

      - name: Build the .deb package
        run: dpkg-deb --build pkg lcos-branding_${{ env.VERSION }}_all.deb

      - name: Create APT repository files
        run: |
          set -e

          mkdir -p repo
          cp lcos-branding_${{ env.VERSION }}_all.deb repo/
          cd repo

          dpkg-scanpackages . /dev/null > Packages
          gzip -c Packages > Packages.gz
          bzip2 -c Packages > Packages.bz2

          {
            echo "Origin: LCOS"
            echo "Label: LCOS-Branding"
            echo "Suite: stable"
            echo "Codename: stable"
            echo "Architectures: all"
            echo "Components: main"
            echo "Description: LCOS Branding Repository"
            echo "Date: $(date -R)"
          } > Release

          for hashtype in MD5Sum SHA1 SHA256 SHA512; do
            echo "${hashtype}:" >> Release
            for f in Packages Packages.gz Packages.bz2; do
              size=$(stat -c %s "$f")
              case $hashtype in
                MD5Sum)  hash=$(md5sum "$f" | cut -d' ' -f1) ;;
                SHA1)    hash=$(sha1sum "$f" | cut -d' ' -f1) ;;
                SHA256)  hash=$(sha256sum "$f" | cut -d' ' -f1) ;;
                SHA512)  hash=$(sha512sum "$f" | cut -d' ' -f1) ;;
              esac
              echo " $hash $size $f" >> Release
            done
          done

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
