name: Build LCOS Branding Repo

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev apt-utils

      - name: Create package structure
        run: |
          mkdir -p pkg/DEBIAN pkg/usr/share/images/desktop-base
          cp lcos-bw-720.jpg pkg/usr/share/images/desktop-base/
          mkdir -p pkg/DEBIAN pkg/usr/share/pixmaps
          cp lcos32.png pkg/usr/share/pixmaps/

          echo "Package: lcos-branding" > pkg/DEBIAN/control
          echo "Version: 1.0-1" >> pkg/DEBIAN/control
          echo "Section: x11" >> pkg/DEBIAN/control
          echo "Priority: optional" >> pkg/DEBIAN/control
          echo "Architecture: all" >> pkg/DEBIAN/control
          echo "Maintainer: Bryan Lunduke <bryan@lundue.com>" >> pkg/DEBIAN/control
          echo "Description: LCOS Branding" >> pkg/DEBIAN/control
          echo " Branding and Wallpaper for LCOS." >> pkg/DEBIAN/control

      - name: Build the .deb package
        run: dpkg-deb --build pkg lcos-branding_1.0-1_all.deb

      - name: Create APT repository files
        run: |
          mkdir -p repo
          cp lcos-branding_1.0-1_all.deb repo/
          cd repo

          # Generate both uncompressed and compressed Packages files
          dpkg-scanpackages . /dev/null > Packages
          gzip -9 Packages

          # Generate proper Release file with Date + hashes
          apt-ftparchive \
            -o APT::FTPArchive::Release::Origin="LCOS" \
            -o APT::FTPArchive::Release::Label="LCOS-Branding" \
            -o APT::FTPArchive::Release::Suite="stable" \
            -o APT::FTPArchive::Release::Codename="stable" \
            -o APT::FTPArchive::Release::Architectures="all" \
            -o APT::FTPArchive::Release::Components="main" \
            -o APT::FTPArchive::Release::Description="LCOS Branding Repository" \
            release . > Release

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
          
